services:
  # Postgres (and Redis, if configured) is hosted externally (not part of this compose file) -
  # nxcare_be reads real host/port/credentials from .env (copied from .env.example, never
  # committed). VAIC_STATE_BACKEND defaults to `memory` (api/demo_state.py, api/deps.py) - only
  # set it to `redis` here once VAIC_REDIS_URL/REDIS_URL is actually present in .env.
  nxcare_be:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nxcare_be
    env_file:
      - .env
    environment:
      # "localhost" here means whatever machine the BROWSER runs on, not this host - a browser
      # reaching this stack via a LAN/tunnel address (e.g. http://10.0.64.77:5175) needs that same
      # address in both of these, not localhost, or every request is silently sent to the
      # browser's own machine instead of here. Override via .env or `FRONTEND_ORIGIN=... docker
      # compose up` when accessing this stack from anywhere other than the host's own localhost.
      VAIC_CORS_ORIGINS: ${FRONTEND_ORIGIN:-http://localhost:5175}
    ports:
      - "${API_PORT:-8000}:8000"

  nxcare_fe:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${BACKEND_ORIGIN:-http://localhost:8000}
    container_name: nxcare_fe
    ports:
      - "${FRONTEND_PORT:-5175}:80"
    depends_on:
      - nxcare_be
